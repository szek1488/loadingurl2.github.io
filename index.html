<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WildWest RP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #0a0603;
        }
        body {
            background: url('image.jpg') no-repeat center center;
            background-size: 100% 100%;
        }
        img {
            display: none;
        }
    </style>
</head>
<body>
    <img src="image.jpg" alt="">
    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>
    <script>
        var music   = document.getElementById('bg-music');
        var curVol  = 0.45;
        var started = false;

        function tryPlay() {
            if (started) return;
            music.volume = curVol;
            var p = music.play();
            if (p) p.then(function() { started = true; }).catch(function() {});
        }

        document.addEventListener('mousemove', tryPlay, { once: true });
        window.addEventListener('load', function() { setTimeout(tryPlay, 100); });
        tryPlay();

        // Обязательные GMod callbacks
        function GameDetails(a,b,c,d,e,f,g) {}
        function SetFilesTotal(n) {}
        function SetFilesNeeded(n) {}
        function DownloadingFile(f) {}
        function SetStatusChanged(s) {}
    </script>
</body>
</html>
